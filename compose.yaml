services:
  server:
    build:
      context: ./apps/server
      dockerfile: Dockerfile
    env_file:
      - ./apps/server/.env
    volumes:
      - bot_farm_server_data:/app/data
      - ./nginx/certs:/app/certs:ro
    restart: unless-stopped

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
      args:
        VITE_SERVER_URL: http://server:3001
    depends_on:
      - server
    ports:
      - "3000:3000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - server
    restart: unless-stopped

volumes:
  bot_farm_server_data:
